name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  VPS_HOST: 88.222.242.20
  VPS_USER: root
  APP_PATH: /root/iaac-website

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << 'ENDSSH'
            set -e
            
            echo "📦 Navigating to app directory..."
            cd ${{ env.APP_PATH }}
            
            echo "⬇️ Pulling latest changes..."
            git pull origin main

            COMPOSE_FILE="docker-compose.prod.yml"
            CERT_DIR="/etc/letsencrypt/live/iaacasia.com"
            if [ ! -f "$CERT_DIR/fullchain.pem" ] || [ ! -f "$CERT_DIR/privkey.pem" ]; then
              echo "⚠️ SSL certificates not found. Falling back to HTTP deployment."
              COMPOSE_FILE="docker-compose.yml"
            fi

            echo "📄 Using compose file: $COMPOSE_FILE"
            docker compose -f "$COMPOSE_FILE" config -q
            
            echo "🔨 Building Docker containers..."
            docker compose -f "$COMPOSE_FILE" build --no-cache
            
            echo "🚀 Starting containers..."
            docker compose -f "$COMPOSE_FILE" up -d --remove-orphans
            docker compose -f "$COMPOSE_FILE" ps
            
            echo "🧹 Cleaning up old images..."
            docker image prune -f
            
            echo "✅ Deployment complete!"
          ENDSSH

      - name: Health check
        run: |
          sleep 30
          curl -fsS https://iaacasia.com/api/health || curl -fsS http://iaacasia.com/api/health
