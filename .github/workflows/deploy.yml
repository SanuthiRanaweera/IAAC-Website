name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  VPS_HOST: 88.222.242.20
  VPS_USER: root
  APP_PATH: /root/iaac-website

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          touch ~/.ssh/known_hosts
          ssh-keyscan -T 10 -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "Host ${{ env.VPS_HOST }}" >> ~/.ssh/config
          echo "  StrictHostKeyChecking accept-new" >> ~/.ssh/config
          chmod 600 ~/.ssh/known_hosts ~/.ssh/config

      - name: Deploy to VPS
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} << 'ENDSSH'
            set -e
            
            echo "📦 Navigating to app directory..."
            cd ${{ env.APP_PATH }}
            
            echo "⬇️ Pulling latest changes..."
            git pull origin main
            
            echo "🔨 Building Docker containers..."
            docker compose -f docker-compose.prod.yml build --no-cache
            
            echo "🚀 Starting containers..."
            docker compose -f docker-compose.prod.yml up -d
            
            echo "🧹 Cleaning up old images..."
            docker image prune -f
            
            echo "✅ Deployment complete!"
          ENDSSH

      - name: Health check
        run: |
          sleep 30
          curl -f https://iaacasia.com/api/health || echo "⚠️ Health check failed, but deployment may still be in progress"
